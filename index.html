<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedance 图生视频</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 1rem;
        }

        /* 密码保护 */
        .password-section {
            background: #151520;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin: 40px 0;
            border: 1px solid #2a2a3a;
        }

        .password-section input {
            width: 100%;
            max-width: 300px;
            padding: 14px 20px;
            font-size: 16px;
            background: #1e1e2e;
            border: 1px solid #3a3a4a;
            border-radius: 10px;
            color: #fff;
            margin-top: 20px;
            outline: none;
        }

        .password-section input:focus {
            border-color: #667eea;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #2a2a3a;
            color: #e0e0e0;
        }

        .btn-secondary:hover {
            background: #3a3a4a;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 主应用 */
        .app {
            display: none;
        }

        .app.active {
            display: block;
        }

        .card {
            background: #151520;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            border: 1px solid #2a2a3a;
        }

        .card-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 图片上传 */
        .upload-zone {
            border: 2px dashed #3a3a4a;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .upload-zone:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .upload-zone.dragover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .upload-zone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #888;
        }

        .upload-hint {
            font-size: 0.85rem;
            color: #666;
            margin-top: 8px;
        }

        /* 图片预览 */
        .image-preview {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .preview-item {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #2a2a3a;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-item .remove {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 24px;
            height: 24px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .preview-item .label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 0.75rem;
            padding: 4px 8px;
            text-align: center;
        }

        /* 表单 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.9rem;
            color: #aaa;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 16px;
            background: #1e1e2e;
            border: 1px solid #3a3a4a;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        /* 滑块 */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: #3a3a4a;
            border-radius: 3px;
            outline: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-value {
            min-width: 40px;
            text-align: center;
            font-weight: 500;
            color: #667eea;
        }

        /* 开关 */
        .toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #3a3a4a;
            border-radius: 13px;
            transition: all 0.3s;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .toggle input {
            display: none;
        }

        .toggle input:checked + .toggle-switch {
            background: #667eea;
        }

        .toggle input:checked + .toggle-switch::after {
            left: 27px;
        }

        /* 任务列表 */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            background: #1e1e2e;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #2a2a3a;
        }

        .task-thumb {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            background: #2a2a3a;
        }

        .task-thumb img,
        .task-thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .task-info {
            flex: 1;
            min-width: 0;
        }

        .task-prompt {
            font-size: 0.9rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 8px;
        }

        .task-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: #888;
        }

        .task-meta span {
            background: #2a2a3a;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .task-status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .task-status.pending {
            background: #3a3a4a;
            color: #888;
        }

        .task-status.processing {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        .task-status.completed {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }

        .task-status.failed {
            background: rgba(245, 101, 101, 0.2);
            color: #f56565;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .task-actions a,
        .task-actions button {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .task-actions a {
            background: #667eea;
            color: white;
        }

        .task-actions button {
            background: #3a3a4a;
            color: #888;
        }

        /* 空状态 */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 加载动画 */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 24px;
            background: #2a2a3a;
            color: #fff;
            border-radius: 10px;
            font-size: 0.95rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: rgba(72, 187, 120, 0.9);
        }

        .toast.error {
            background: rgba(245, 101, 101, 0.9);
        }

        /* 响应式 */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .task-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .task-thumb {
                width: 100%;
                height: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Seedance</h1>
            <p class="subtitle">AI 图生视频生成工具</p>
        </header>

        <!-- 密码验证 -->
        <div class="password-section" id="passwordSection">
            <h2>🔒 请输入访问密码</h2>
            <input type="password" id="passwordInput" placeholder="Password" onkeypress="if(event.key==='Enter')checkPassword()">
            <br><br>
            <button class="btn btn-primary" onclick="checkPassword()">进入</button>
        </div>

        <!-- 主应用 -->
        <div class="app" id="app">
            <!-- 创建任务 -->
            <div class="card">
                <h3 class="card-title">📤 上传图片</h3>
                <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)" style="display:none">
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">点击或拖拽上传图片</div>
                    <div class="upload-hint">支持 JPG、PNG、WEBP，单张最大 10MB</div>
                </div>
                <div class="image-preview" id="imagePreview"></div>
            </div>

            <!-- 参数配置 -->
            <div class="card">
                <h3 class="card-title">⚙️ 参数配置</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>生成模式</label>
                        <select id="mode" onchange="updateMode()">
                            <option value="first_frame">单图生视频（首帧）</option>
                            <option value="first_last_frame">首尾帧生视频</option>
                            <option value="reference">参考图生视频</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>分辨率</label>
                        <select id="resolution">
                            <option value="480p" selected>480p</option>
                            <option value="720p">720p</option>
                            <option value="1080p">1080p</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>宽高比</label>
                        <select id="ratio">
                            <option value="16:9" selected>16:9 (横屏)</option>
                            <option value="4:3">4:3</option>
                            <option value="1:1">1:1 (方形)</option>
                            <option value="3:4">3:4</option>
                            <option value="9:16">9:16 (竖屏)</option>
                            <option value="21:9">21:9 (宽屏)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>视频时长: <span class="slider-value" id="durationValue">5</span>秒</label>
                        <div class="slider-container">
                            <input type="range" id="duration" min="2" max="12" value="5" oninput="document.getElementById('durationValue').textContent=this.value">
                        </div>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 20px;">
                    <label>提示词（可选）</label>
                    <textarea id="prompt" placeholder="描述你想要的视频效果，如：模特优雅转身，裙摆飘逸..."></textarea>
                </div>
                <div style="display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap;">
                    <label class="toggle">
                        <input type="checkbox" id="generateAudio">
                        <span class="toggle-switch"></span>
                        <span>生成音频（仅 1.5 Pro 支持）</span>
                    </label>
                    <label class="toggle">
                        <input type="checkbox" id="watermark">
                        <span class="toggle-switch"></span>
                        <span>添加水印</span>
                    </label>
                </div>
                <br>
                <button class="btn btn-primary" id="createBtn" onclick="createTask()" style="width: 100%;">
                    🚀 开始生成视频
                </button>
            </div>

            <!-- 任务列表 -->
            <div class="card">
                <h3 class="card-title">
                    📋 任务列表
                    <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem; margin-left: auto;" onclick="loadTasks()">🔄 刷新</button>
                </h3>
                <div class="task-list" id="taskList">
                    <div class="empty">
                        <div class="empty-icon">📭</div>
                        <p>暂无任务</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ==================== 全局状态 ====================
        let password = localStorage.getItem('seedance_password') || '';
        let uploadedImages = [];
        let isUploading = false;
        let pollInterval = null;

        // ==================== 初始化 ====================
        if (password) {
            document.getElementById('passwordInput').value = password;
            checkPassword();
        }

        // 拖拽上传
        const uploadZone = document.getElementById('uploadZone');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadZone.addEventListener(eventName, preventDefaults, false);
        });
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        ['dragenter', 'dragover'].forEach(eventName => {
            uploadZone.addEventListener(eventName, () => uploadZone.classList.add('dragover'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            uploadZone.addEventListener(eventName, () => uploadZone.classList.remove('dragover'), false);
        });
        uploadZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files), false);

        // 点击上传区域触发文件选择
        uploadZone.addEventListener('click', (e) => {
            document.getElementById('fileInput').click();
        });

        // ==================== 密码验证 ====================
        async function checkPassword() {
            password = document.getElementById('passwordInput').value;
            if (!password) {
                showToast('请输入密码', 'error');
                return;
            }

            try {
                const response = await fetch(`/api/tasks?password=${encodeURIComponent(password)}&limit=1`);
                if (response.ok) {
                    localStorage.setItem('seedance_password', password);
                    document.getElementById('passwordSection').style.display = 'none';
                    document.getElementById('app').classList.add('active');
                    loadTasks();
                    startPolling();
                } else {
                    showToast('密码错误', 'error');
                }
            } catch (e) {
                showToast('网络错误', 'error');
            }
        }

        // ==================== 图片上传 ====================
        async function handleFiles(files) {
            if (isUploading) return;

            const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            if (imageFiles.length === 0) {
                showToast('请选择图片文件', 'error');
                return;
            }

            // 检查模式限制
            const mode = document.getElementById('mode').value;
            const maxImages = mode === 'first_last_frame' ? 2 : 1;

            if (uploadedImages.length + imageFiles.length > maxImages) {
                showToast(`${mode === 'first_last_frame' ? '首尾帧模式' : '当前模式'}最多上传 ${maxImages} 张图片`, 'error');
                return;
            }

            isUploading = true;
            document.getElementById('createBtn').disabled = true;

            for (const file of imageFiles) {
                if (file.size > 10 * 1024 * 1024) {
                    showToast(`${file.name} 超过 10MB 限制`, 'error');
                    continue;
                }

                const formData = new FormData();
                formData.append('file', file);
                formData.append('password', password);

                try {
                    const response = await fetch('/api/upload', {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        const result = await response.json();
                        uploadedImages.push(result.url);
                        renderImagePreview();
                        showToast('上传成功');
                    } else {
                        showToast('上传失败', 'error');
                    }
                } catch (e) {
                    showToast('上传错误', 'error');
                }
            }

            isUploading = false;
            document.getElementById('createBtn').disabled = false;
        }

        function renderImagePreview() {
            const container = document.getElementById('imagePreview');
            const mode = document.getElementById('mode').value;

            container.innerHTML = uploadedImages.map((url, index) => `
                <div class="preview-item">
                    <img src="${url}" alt="">
                    <button class="remove" onclick="removeImage(${index})">×</button>
                    <div class="label">${mode === 'first_last_frame' ? (index === 0 ? '首帧' : '尾帧') : '图片'}</div>
                </div>
            `).join('');
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderImagePreview();
        }

        function updateMode() {
            uploadedImages = [];
            renderImagePreview();
            const mode = document.getElementById('mode').value;
            const hint = mode === 'first_last_frame'
                ? '支持 JPG、PNG、WEBP，需上传 2 张图片（首帧和尾帧）'
                : '支持 JPG、PNG、WEBP，单张最大 10MB';
            document.querySelector('.upload-hint').textContent = hint;
        }

        // ==================== 创建任务 ====================
        async function createTask() {
            if (uploadedImages.length === 0) {
                showToast('请先上传图片', 'error');
                return;
            }

            const mode = document.getElementById('mode').value;
            if (mode === 'first_last_frame' && uploadedImages.length !== 2) {
                showToast('首尾帧模式需要上传 2 张图片', 'error');
                return;
            }

            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> 创建中...';

            const formData = new FormData();
            formData.append('mode', mode);
            formData.append('image_urls', JSON.stringify(uploadedImages));
            formData.append('prompt', document.getElementById('prompt').value);
            formData.append('resolution', document.getElementById('resolution').value);
            formData.append('ratio', document.getElementById('ratio').value);
            formData.append('duration', document.getElementById('duration').value);
            formData.append('generate_audio', document.getElementById('generateAudio').checked);
            formData.append('watermark', document.getElementById('watermark').checked);
            formData.append('password', password);

            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    showToast('任务创建成功');
                    uploadedImages = [];
                    renderImagePreview();
                    document.getElementById('prompt').value = '';
                    loadTasks();
                } else {
                    const err = await response.json();
                    showToast(err.detail || '创建失败', 'error');
                }
            } catch (e) {
                showToast('创建错误', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '🚀 开始生成视频';
        }

        // ==================== 任务列表 ====================
        async function loadTasks() {
            try {
                const response = await fetch(`/api/tasks?password=${encodeURIComponent(password)}`);
                if (!response.ok) {
                    if (response.status === 403) {
                        localStorage.removeItem('seedance_password');
                        location.reload();
                    }
                    return;
                }

                const data = await response.json();
                renderTasks(data.tasks);
            } catch (e) {
                console.error('Load tasks error:', e);
            }
        }

        function renderTasks(tasks) {
            const container = document.getElementById('taskList');

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">📭</div>
                        <p>暂无任务</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = tasks.map(task => {
                const thumbUrl = task.video_url || (task.image_urls && task.image_urls[0]);
                const isVideo = !!task.video_url;

                let statusClass = task.status;
                let statusText = {
                    'pending': '等待中',
                    'processing': '生成中',
                    'completed': '已完成',
                    'failed': '失败'
                }[task.status] || task.status;

                return `
                    <div class="task-item">
                        <div class="task-thumb">
                            ${isVideo
                                ? `<video src="${thumbUrl}" controls></video>`
                                : `<img src="${thumbUrl}" alt="">`
                            }
                        </div>
                        <div class="task-info">
                            <div class="task-prompt">${task.prompt || '无提示词'}</div>
                            <div class="task-meta">
                                <span>${task.resolution} · ${task.ratio}</span>
                                <span>${task.duration}秒</span>
                                ${task.generate_audio ? '<span>🎵 有声</span>' : ''}
                                <span>${new Date(task.created_at).toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="task-status ${statusClass}">${statusText}</div>
                        <div class="task-actions">
                            ${task.video_url ? `<a href="${task.video_url}" target="_blank" download>下载</a>` : ''}
                            <button onclick="deleteTask('${task.id}')">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function deleteTask(taskId) {
            if (!confirm('确定删除此任务？')) return;

            try {
                const response = await fetch(`/api/tasks/${taskId}?password=${encodeURIComponent(password)}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showToast('删除成功');
                    loadTasks();
                } else {
                    showToast('删除失败', 'error');
                }
            } catch (e) {
                showToast('删除错误', 'error');
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(loadTasks, 3000);
        }

        // ==================== 工具函数 ====================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
